name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements-dev.txt

      - name: Install dependencies
        run: pip install -r requirements-dev.txt

      - name: Unit tests (contract + config validation)
        run: python -m pytest sdks/harbor-box-evals/adapter_test.py -m "not real_box" -v

      - name: Live Box validation
        env:
          BOX_API_KEY: ${{ secrets.BOX_API_KEY }}
        run: |
          if [ -z "$BOX_API_KEY" ]; then
            echo "::warning::BOX_API_KEY secret not set; skipping live Box validation (expected on fork PRs)."
            exit 0
          fi
          python -m pytest sdks/harbor-box-evals/adapter_test.py -m real_box -v
